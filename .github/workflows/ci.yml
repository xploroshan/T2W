name: CI

on:
  pull_request:
    branches: ["main", "master"]
  push:
    branches: ["main", "master"]
  workflow_dispatch:

# Cancel in-progress runs of this workflow for the same branch when a new
# commit arrives — saves CI minutes on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        # Disable the postinstall hook — it runs db push + seeds against
        # an unreachable Neon DB and would fail the CI install. Each job
        # below sets the env vars it actually needs.
        run: npm ci --ignore-scripts
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Lint
        run: npm run lint

  unit:
    name: Unit tests (vitest)
    runs-on: ubuntu-latest
    env:
      # Vitest mocks Prisma at the module level — no real DB needed — but
      # @prisma/client refuses to load without a URL set, so plumb a dummy.
      DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
      DATABASE_URL_UNPOOLED: postgresql://dummy:dummy@localhost:5432/dummy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --ignore-scripts
      - run: npx prisma generate
      - name: Vitest (run mode)
        run: npm run test:run

  smoke-e2e:
    name: Smoke E2E (playwright @smoke)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
      DATABASE_URL_UNPOOLED: postgresql://dummy:dummy@localhost:5432/dummy
      # Stub Google Maps key so the loader effect fires; mocks intercept
      # the actual script request.
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: stub-for-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --ignore-scripts
      - run: npx prisma generate
      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium
      - name: Run @smoke subset
        run: npm run test:e2e:smoke
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
